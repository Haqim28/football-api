version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: football_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: football_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: football_api
    ports:
      - "8080:8080"
    environment:
      APP_PORT: 8080
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: football_db
      DB_SSLMODE: disable
      API_KEY: my-super-secret-api-key
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
